# OPL v2.1 P0-#4: goal → expert routing table.
# v2.5.1 B4: bilingual coverage — Chinese natural-language patient queries
# must hit the same expert team as their English equivalents. Each entry
# unions the English keyword set with the most common Chinese synonyms.
#
# Each entry's key is a Python regex (compiled with re.IGNORECASE). The
# pattern is matched against the verbatim patient goal text; on a hit the
# listed experts are added to the planner's task list at expansion time.
#
# Keep patterns tight (anchored with word boundaries where possible) — false
# positives here pull non-relevant experts onto the team and slow Wave 1.
#
# ADR-0021 invariant: the router supplements the comorbid_planner trigger
# expansion; it does NOT replace it. Both run.
keywords:
  "vaccine|neoantigen|TCR-T|疫苗|新抗原|个性化新抗原|肿瘤疫苗": [tyler, frances, maya, julius, mark]
  "irae|rechallenge|endocrine_AE|免疫相关不良反应|再激发|内分泌副作用": [mark, mary]
  "cross_border|expanded_access|跨境|海外就医|扩展准入|同情用药": [dennis, frances]
  "metastatic_resistance|转移|耐药|进展": [bert, julius, maya]
  "MSI-H|MSS|mismatch_repair|微卫星|错配修复|微卫星不稳定": [bert]
  "TMB|mutational_burden|肿瘤突变负荷": [bert]
  "HRD|BRCA|platinum_sensitivity|铂类敏感|同源重组缺陷": [bert]
  "germline|hereditary|BRCA1|BRCA2|遗传|胚系|家族史": [bert]
  "DPYD|TPMT|UGT1A1|CYP2D6|药物基因组": [mary]
  "ctDNA|MRD|微小残留|液体活检": [bert, aviv]
  # v2.5.1 B4 — c3195b66 family. AutoML / prognostic-model questions get
  # routed to Bert (molecular), Aviv (bioinformatics), Iain (meta-analysis).
  # Real routing to `unknown_task_intake` is the intake_router's job; this
  # entry only assembles the right team. intake-router design.
  "automl|machine learning|deep learning|XGBoost|prognostic model|机器学习|预后模型|建模预测|自动建模|AutoML|预后预测": [bert, aviv, iain]
