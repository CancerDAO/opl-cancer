# OPL for Cancer — production model + reviewer pool roster
# Spec §7 G13: Reviewer model MUST != Executor model.
# Spec §12: Versions locked (no silent updates).
#
# NOTE (harness split — docs/iteration/HARNESS_SPLIT_PRD.md):
# The patient-delivery path NO LONGER calls LLMs internally (the host agent is
# the executor) and does NOT read executor_model / reviewer_pool / provider keys
# from this file. As of the harness split this roster ONLY serves the evolution
# engine / G13 reviewer-distinct redefinition (orchestrator/* + evolution/*).
# The patient CLI does not load this file.

executor_model:
  id: claude-opus-4-7
  provider: anthropic
  api_base: https://api.anthropic.com
  context_window: 1000000
  max_tokens: 32768
  version_pinned: true
  rationale: |
    Spec §17.5 P2 per-task routing — Opus is default executor for deep
    reasoning (hypothesis generation, meta-analysis, drill-down).
    Never silently swap to a cheaper model (see CONTRIBUTING.md discipline rule #4).

reviewer_pool:
  - id: minimax-m2-7
    provider: minimax
    api_base: https://api.minimaxi.com/v1
    context_window: 192000
    max_tokens: 96000
    version_pinned: true
    rationale: |
      Default Reviewer for cross-model diversity.
      Different model family than executor (Anthropic vs MiniMax).

  - id: gpt-5
    provider: openai
    api_base: https://api.openai.com/v1
    context_window: 400000
    max_tokens: 16384
    version_pinned: true
    rationale: |
      Tertiary reviewer for second-opinion when MiniMax + Claude disagree.

# Integrator cache TTL per family — spec §17.5 P2 + Iter 15.
# Values in seconds. Concrete integrators may further override per-key via
# `Integrator(ttl_seconds_overrides={...})` or class `default_ttl_seconds_overrides`.
integrator_ttl_seconds:
  nccn: 2592000             # 30 days — guideline excerpts change slowly
  pubmed: 604800            # 7 days — abstract corpus stable-ish
  clinicaltrials: 86400     # 1 day — trial statuses update frequently
  civic: 604800             # 7 days
  oncokb: 604800            # 7 days
  fda_eap: 604800           # 7 days

# Per-task model routing — spec §17.5 P2.
# Falls back to executor_model when task_package is absent from this map.
# Opus default for deep reasoning (CONTRIBUTING.md discipline rule #4);
# only swap to MiniMax where its capability is demonstrably sufficient.
per_task_routing:
  bioinformatics_data_analysis: claude-opus-4-7   # heavy code reasoning
  literature_synthesis: minimax-m2-7              # cheaper, sufficient for paraphrase
  hypothesis_generation: claude-opus-4-7          # deep reasoning
  meta_analysis: claude-opus-4-7                  # cross-evidence synthesis

# Reviewer pairings — P5 per spec §2.2 reviewer rotation.
# Rule: reviewer expert MUST NOT be the same as producer; pairing pairs cross-
# domain so genomics is reviewed by clinical, trials by EAP, etc.
# Independent third-party lens — reviewer expert is never the producer.
reviewer_pairings:
  # ── Genomics ↔ Bioinformatics ──
  bert: aviv      # somatic-genomics (Vogelstein archetype) reviewed by bioinformatics/single-cell (Regev archetype)
  aviv: bert      # bioinformatics reviewed by somatic-genomics
  # ── Pharmacology ↔ Wet-lab biology ──
  mary: tyler     # DDI / ADME (pharmacology) reviewed by wet-lab biology (Jacks archetype)
  tyler: mary     # wet-lab biology reviewed by pharmacology
  # ── Pathology ↔ Trial matching ──
  rosa: rick      # pathology-judgment reviewed by trial-matching specialist
  rick: rosa      # trial-matching reviewed by pathology-judgment
  # ── Meta-analysis ↔ Radiology / Imaging response ──
  # (Iain = Cochrane archetype, Heddy = Radiology / imaging response measurement)
  # Cross-domain so pooled effect-sizes are sanity-checked against imaging-derived
  # response definitions (e.g. RECIST 1.1 vs iRECIST endpoint heterogeneity in
  # pooled cohorts). This pairing IS deliberate cross-domain (v1.3.0 EVAL panel
  # flagged the prior "irAE reviewed by hepatology" comment as a mislabel — neither
  # Iain nor Heddy is irAE / hepatology; comment fixed in v1.3.0 to match scope).
  iain: heddy     # meta-pooled effect sizes reviewed against imaging-response definitions
  heddy: iain     # imaging-response interpretation reviewed against meta-pool heterogeneity
  # ── Treatment-line ↔ Meta-analysis ──
  # NEW in v1.3.0 EVAL: Patient #4 (irAE rechallenge) needs Vince's clinical
  # rechallenge judgment cross-reviewed against Iain's pooled rebound-rate meta.
  # Vince is reviewed by Iain (replaces prior `vince: aviv` for the irAE-rechallenge
  # path). For Wave 2/3 mechanism reviews Vince still routes to Aviv via the
  # per-task override (see per_task_routing). Iain ⟂ Heddy carries the
  # reverse direction when meta needs imaging-response sanity.
  vince: iain     # treatment-line judgment reviewed against pooled-evidence meta
  # ── Translational / Radiation ↔ Bioinformatics ──
  ted: aviv       # radiation oncology (dose / fractionation) reviewed by bioinformatics
  hong: bert      # TCM / herb-drug interaction reviewed by genomics (CYP impact)
  # ── Supportive ↔ Pathology ──
  jen: rosa       # palliative reviewed by pathology
  kieren: rosa    # neutropenic-fever reviewed by pathology
  mark: iain      # endocrine irAE reviewed against general irAE pooled evidence
  # ── EAP ↔ Cross-border ──
  frances: dennis # EAP reviewed by cross-border navigator
  dennis: frances # cross-border reviewed by EAP
  # ── Interventional ↔ Radiation ──
  riad: ted       # interventional (TARE / TACE) reviewed by radiation oncology
  steve: tyler    # nutrition reviewed by wet-lab biology
