# OPL for Cancer — production model + reviewer pool roster
# Spec §7 G13: Reviewer model MUST != Executor model.
# Spec §12: Versions locked (no silent updates).

executor_model:
  id: claude-opus-4-7
  provider: anthropic
  api_base: https://api.anthropic.com
  context_window: 1000000
  max_tokens: 32768
  version_pinned: true
  rationale: |
    Spec §17.5 P2 per-task routing — Opus is default executor for deep
    reasoning (hypothesis generation, meta-analysis, drill-down).
    memory:feedback_no_model_downgrade — never silently swap to cheaper model.

reviewer_pool:
  - id: minimax-m2-7
    provider: minimax
    api_base: https://api.minimaxi.com/v1
    context_window: 192000
    max_tokens: 96000
    version_pinned: true
    rationale: |
      memory:reference_minimax_llm — default Reviewer for cross-model diversity.
      Different model family than executor (Anthropic vs MiniMax).

  - id: gpt-5
    provider: openai
    api_base: https://api.openai.com/v1
    context_window: 400000
    max_tokens: 16384
    version_pinned: true
    rationale: |
      Tertiary reviewer for second-opinion when MiniMax + Claude disagree.

# Integrator cache TTL per family — spec §17.5 P2 + Iter 15.
# Values in seconds. Concrete integrators may further override per-key via
# `Integrator(ttl_seconds_overrides={...})` or class `default_ttl_seconds_overrides`.
integrator_ttl_seconds:
  nccn: 2592000             # 30 days — guideline excerpts change slowly
  pubmed: 604800            # 7 days — abstract corpus stable-ish
  clinicaltrials: 86400     # 1 day — trial statuses update frequently
  civic: 604800             # 7 days
  oncokb: 604800            # 7 days
  fda_eap: 604800           # 7 days

# Per-task model routing — spec §17.5 P2.
# Falls back to executor_model when task_package is absent from this map.
# memory:feedback_no_model_downgrade — Opus default for deep reasoning;
# only swap to MiniMax where its capability is demonstrably sufficient.
per_task_routing:
  bioinformatics_data_analysis: claude-opus-4-7   # heavy code reasoning
  literature_synthesis: minimax-m2-7              # cheaper, sufficient for paraphrase
  hypothesis_generation: claude-opus-4-7          # deep reasoning
  meta_analysis: claude-opus-4-7                  # cross-evidence synthesis

# Reviewer pairings — P5 per spec §2.2 reviewer rotation.
# Rule: reviewer expert MUST NOT be the same as producer; pairing pairs cross-
# domain so genomics is reviewed by clinical, trials by EAP, etc.
# memory:feedback_review_via_parallel_subagents — independent third-party lens.
reviewer_pairings:
  # Genomics ↔ Pharmacology / Mechanism
  bert: aviv      # somatic-genomics reviewed by mechanism-of-action expert
  aviv: bert      # MoA reviewed by somatic-genomics
  # Bioinformatics ↔ Pharmacology
  mary: tyler     # ddi/adme reviewed by bioinformatics
  tyler: mary     # bioinformatics reviewed by pharmacology
  # Clinical ↔ Trial matching
  rosa: rick      # clinical-judgment reviewed by trial-matching
  rick: rosa      # trial-matching reviewed by clinical-judgment
  # Toxicity ↔ Clinical
  iain: heddy     # irAE reviewed by hepatology
  heddy: iain     # hepatology reviewed by irAE
  # Translational ↔ Mechanism
  ted: aviv       # translational reviewed by MoA
  vince: aviv     # immunotherapy reviewed by MoA
  hong: bert      # cytokine-immuno reviewed by genomics
  # Supportive ↔ Clinical
  jen: rosa       # supportive-care reviewed by clinical-judgment
  kieren: rosa    # neutropenic-fever reviewed by clinical-judgment
  mark: iain      # endocrine irAE reviewed by general irAE
  # EAP / Cross-border
  frances: dennis # EAP reviewed by cross-border navigator
  dennis: frances # cross-border reviewed by EAP
  # Specialised
  riad: ted       # data-driven hypothesis reviewed by translational
  steve: tyler    # bioinformatic-pipeline reviewed by bioinformatics
