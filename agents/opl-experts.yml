# v2.1 P0-#3: OPL-specific subagent types with file-write grants.
#
# Format mirrors Claude Code subagent definitions. The 20 named experts +
# Henry (IRB-substitute auditor) each get Write scoped to the patient's
# triggers/<run_id>/tasks/** (or audit/** for Henry). MCP grants are
# included only for the experts whose canonical workflow depends on them
# — over-granting tool surface area dilutes the file-write contract.
#
# To install: `opl preflight --install-agents` copies this file into
# ~/.claude/agents/opl-experts.yml. See docs/SUBAGENT_CONTRACT.md for the
# fallback path when general-purpose subagents are used instead.

agents:
  - name: opl-rosa
    description: "OPL Pathologist (Juan Rosai inspiration). Reads patient imaging + biopsy, writes pathology report."
    tools: [Read, Grep, Glob, Bash, Write]
    tool_scopes:
      Write: "patients/*/triggers/*/tasks/**"
    web: false

  - name: opl-bert
    description: "OPL Molecular Geneticist (Bert Vogelstein inspiration). Variant interpretation."
    tools: [Read, Grep, Glob, Bash, Write, mcp__oncology-db__*]
    tool_scopes:
      Write: "patients/*/triggers/*/tasks/**"
    web: false

  - name: opl-vince
    description: "OPL Treating Oncologist (Vince DeVita inspiration). Synthesises team into treatment-line decision."
    tools: [Read, Grep, Glob, Bash, Write]
    tool_scopes:
      Write: "patients/*/triggers/*/tasks/**"
    web: false

  - name: opl-rick
    description: "OPL Clinical Trial Specialist. ChiCTR + CT.gov + EAP access."
    tools: [Read, Grep, Glob, Bash, Write, WebSearch, WebFetch, mcp__chictr__*]
    tool_scopes:
      Write: "patients/*/triggers/*/tasks/**"
    web: true

